<!doctype html>
<html lang="en">
	<head>
		<script>
			// Dev only: unregister stale PWA service workers before app JS loads
			if (location.hostname === 'localhost' && 'serviceWorker' in navigator) {
				navigator.serviceWorker.getRegistrations().then(function (regs) {
					regs.forEach(function (r) {
						r.unregister();
					});
				});
				if (typeof caches !== 'undefined') {
					caches.keys().then(function (keys) {
						keys.forEach(function (key) {
							caches.delete(key);
						});
					});
				}
			}
		</script>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, viewport-fit=cover"
		/>
		<meta name="text-scale" content="scale" />
		<title>LeafBuddy</title>
		<meta name="description" content="Track and care for your plants" />
		<meta name="theme-color" content="#15803d" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#14532d" media="(prefers-color-scheme: dark)" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="LeafBuddy" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="mobile-web-app-capable" content="yes" />
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
